# Artway-TM — jedyne źródło polityki dostępu SSH.
# Nazwa 00-* jest celowa: OpenSSH stosuje pierwszą napotkaną wartość.

PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no
PubkeyAuthentication yes
AuthenticationMethods publickey
UsePAM yes

# Jedynym interaktywnym kontem administracyjnym jest artway.
AllowUsers artway

# Bezpieczna praca zdalna: lokalne tunele są potrzebne VS Code,
# ale tunelowanie z Internetu, agent i X11 nie są potrzebne.
AllowTcpForwarding local
AllowStreamLocalForwarding yes
AllowAgentForwarding no
GatewayPorts no
X11Forwarding no
PermitTunnel no
PermitUserEnvironment no
PermitUserRC no

LoginGraceTime 30
MaxAuthTries 3
MaxSessions 10
MaxStartups 10:30:60
ClientAliveInterval 120
ClientAliveCountMax 3
UseDNS no
LogLevel VERBOSE
DebianBanner no
