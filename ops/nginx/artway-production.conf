server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    server_name artwaytm.pl www.artwaytm.pl;

    if ($host = www.artwaytm.pl) {
        return 301 https://artwaytm.pl$request_uri;
    }

    # Każda publikacja trafia do niezmiennego katalogu wersji. Nginx widzi
    # wyłącznie atomowo przełączany symlink; nie obsłuży połowy wdrożenia.
    root /srv/artway/releases/current;
    index index.html;
    charset utf-8;
    client_max_body_size 25m;

    include /srv/artway/shop/ops/nginx/artway-seo-pages.conf;
    include /srv/artway/shop/ops/nginx/artway-health.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    include /srv/artway/shop/ops/nginx/artway-security-headers.conf;

    location = /api/store {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000/api/store;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location = /.netlify/functions/store {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000/.netlify/functions/store;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = /.netlify/functions/telegram-webhook {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000/.netlify/functions/telegram-webhook;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location = /sitemap.xml {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000/sitemap.xml;
    }

    location = /google-products.xml {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3000/google-products.xml;
    }

    # Manifest i worker aplikacji są zawsze sprawdzane w sieci, aby telefon
    # po publikacji nie uruchamiał nieaktualnej wersji panelu.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /sw.js {
        default_type application/javascript;
        try_files $uri =404;
        include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location ~ /\. {
        deny all;
    }

    # Kod serwera, testy i konfiguracja nigdy nie mogą zostać obsłużone
    # przez awaryjny routing aplikacji SPA.
    location ~ ^/(?:server\.mjs|package(?:-lock)?\.json|netlify\.toml|scripts(?:/|$)|tests(?:/|$)|server-config(?:/|$)) {
        return 404;
    }

    location ~* \.(?:css|js|png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/artwaytm.pl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/artwaytm.pl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    server_name allsklep.pl www.allsklep.pl;
    include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
    # Jedna domena kanoniczna, ale zachowana anonimowa atrybucja adresu wejścia.
    # Parametr jest usuwany z paska adresu przez aplikację po zapisaniu sesji.
    return 301 https://artwaytm.pl$uri?entry_domain=allsklep.pl&$args;

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/artwaytm.pl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/artwaytm.pl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.artwaytm.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = artwaytm.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name artwaytm.pl www.artwaytm.pl;
    return 404; # managed by Certbot




}

server {
    if ($host = www.allsklep.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = allsklep.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name allsklep.pl www.allsklep.pl;
    return 404; # managed by Certbot




}
