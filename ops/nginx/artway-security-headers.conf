# Jeden kanoniczny zestaw nagłówków bezpieczeństwa Artway-TM. Plik należy
# dołączać także w location, które definiują własny add_header (Nginx < 1.29
# nie dziedziczy wtedy nagłówków z poziomu server).
# Odpowiedzi proxy dostają ten sam kanoniczny zestaw zamiast dwóch różnych
# wartości pochodzących jednocześnie z aplikacji i Nginx.
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Referrer-Policy;
proxy_hide_header X-Frame-Options;
proxy_hide_header Permissions-Policy;
proxy_hide_header Content-Security-Policy;
proxy_hide_header Strict-Transport-Security;

# Skrypty i arkusze jako elementy są rygorystyczne. Zgodność starych kontrolek
# panelu jest ograniczona wyłącznie do atrybutów; nie rozszerza script-src ani
# style-src i może być dalej migrowana do delegowanych zdarzeń bez obniżania CSP.
add_header Strict-Transport-Security "max-age=31536000" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://*.paynow.pl; script-src 'self' https://geowidget.inpost.pl; script-src-elem 'self' https://geowidget.inpost.pl; script-src-attr 'unsafe-inline'; style-src 'self' https://geowidget.inpost.pl; style-src-elem 'self' https://geowidget.inpost.pl; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https://geowidget.inpost.pl; connect-src 'self' https://wl-api.mf.gov.pl; frame-src 'self' https://geowidget-app.inpost.pl https://*.paynow.pl; worker-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'; upgrade-insecure-requests" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header Origin-Agent-Cluster "?1" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header X-XSS-Protection "0" always;
