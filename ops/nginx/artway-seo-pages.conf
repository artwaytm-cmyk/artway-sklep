# Wstawiany do głównego bloku server artwaytm.pl. Czyste adresy publiczne są
# renderowane przez backend, dzięki czemu robot od razu otrzymuje treść i JSON-LD.
location ~ ^/(?:produkt|kategoria)/[^/]+/?$ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3000;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_cache_bypass $http_cache_control;
}

location ~ ^/(?:promocje|nowosci)/?$ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3000;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
}

location ^~ /api/seo/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:3000;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    include /srv/artway/shop/ops/nginx/artway-security-headers.conf;
    add_header Cache-Control "no-store" always;
}
