# Publiczny, lekki monitoring VPS. Ten adres nie może przechodzić przez
# awaryjny routing SPA, ponieważ odpowiedź index.html ze statusem 200
# ukryłaby niedostępność backendu przed monitoringiem.
location = /healthz {
    access_log off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://127.0.0.1:3000/healthz;
    proxy_connect_timeout 2s;
    proxy_read_timeout 3s;
    proxy_send_timeout 3s;
    proxy_buffering off;
    proxy_intercept_errors on;
    proxy_no_cache 1;
    error_page 500 502 503 504 =503 @artway_health_unavailable;
}

# Jednoznaczna odpowiedź awaryjna dla systemów monitorujących. Nigdy nie
# zwracamy tutaj index.html ani kodu 200, kiedy proces aplikacji nie działa.
location @artway_health_unavailable {
    internal;
    default_type application/json;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    return 503 '{"ok":false,"service":"artway-vps","error":"backend_unavailable"}';
}
